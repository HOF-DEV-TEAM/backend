version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # Core correctness
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused

    # Style & formatting
    - goimports
    - misspell
    - revive

    # Code quality
    - gocritic
    - prealloc
    - gosimple

    # Security
    - gosec

    # Performance
    - bodyclose
    - noctx

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false

    govet:
      enable:
        - shadow
        - nilness

    revive:
      rules:
        - name: exported
          severity: warning
        - name: var-naming
        - name: unexported-return
        - name: error-strings
        - name: error-return

    gocritic:
      enabled-checks:
        - badLock
        - badRegexp
        - emptyDecl
        - hugeParam
        - importShadow
        - initClause
        - nestingReduce
        - nilValReturn
        - paramTypeCombine
        - rangeExprCopy
        - rangeValCopy
        - stringXbytes
        - truncateCmp
        - typeUnparen
        - unnecessaryBlock
        - unlabelStmt
        - unnamedResult
        - weakCond
      disabled-checks:
        - commentedOutCode
        - whyNoLint

    misspell:
      locale: US

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    staticcheck:
      checks:
        - "all"
        - "-SA1019"

    godot:
      scope: declarations
      period: true
      capital: false

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  new: false

  exclusions:
    rules:
      # Test files — allow more flexibility
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - gocritic

      # Generated Swagger docs — don't lint
      - path: docs/
        linters:
          - errcheck
          - govet
          - staticcheck
          - gocritic
          - gosec
          - revive
          - misspell

      # Allow G304 (file path from variable) in migration runner
      - path: internal/infrastructure/database/gorm\.go
        linters:
          - gosec
        text: "G304"

      # Allow unhandled errors on response writes (standard HTTP pattern)
      - path: internal/interfaces/http/
        linters:
          - errcheck
        text: "json.NewEncoder"

      # Allow shadowing of err in test helpers
      - path: _test\.go
        linters:
          - govet
        text: "shadow"
