run:
  timeout: 5m
  go: "1.26"
  tests: true

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false

  govet:
    enable-all: false
    enable:
      - shadow
      - nilness

  goimports:
    local-prefixes: bitbucket.org/hofng/hofApp

  revive:
    rules:
      - name: exported
        severity: warning
      - name: var-naming
      - name: unexported-return
      - name: error-strings
      - name: error-return

  gocritic:
    enabled-checks:
      - appendAssign
      - argOrder
      - badCall
      - badLock
      - badRegexp
      - commentFormatting
      - deprecatedComment
      - dupArg
      - dupBranchBody
      - emptyDecl
      - exitAfterDefer
      - hugeParam
      - ifElseChain
      - importShadow
      - initClause
      - nestingReduce
      - nilValReturn
      - paramTypeCombine
      - rangeExprCopy
      - rangeValCopy
      - sloppyLen
      - stringXbytes
      - truncateCmp
      - typeAssert
      - typeUnparen
      - underef
      - unnecessaryBlock
      - unlabelStmt
      - unnamedResult
      - weakCond
    disabled-checks:
      - commentedOutCode   # too noisy during development
      - whyNoLint          # too strict

  misspell:
    locale: US

  prealloc:
    simple: true
    range-loops: true
    for-loops: false

  staticcheck:
    checks:
      - "all"
      - "-SA1019"  # allow deprecated usage (legacy code)

  godot:
    scope: declarations
    period: true
    capital: false

linters:
  disable-all: true
  enable:
    # Core correctness
    - errcheck          # check error return values
    - govet             # go vet with additional checks
    - staticcheck       # advanced static analysis
    - ineffassign       # detect ineffectual assignments
    - unused            # detect unused code

    # Style & formatting
    - goimports         # goimports formatting
    - misspell          # spelling in comments
    - revive            # drop-in golint replacement

    # Code quality
    - gocritic          # opinionated checks
    - prealloc          # suggest pre-allocated slices
    - gosimple          # suggest code simplifications

    # Security
    - gosec             # security checks

    # Performance
    - bodyclose         # ensure http.Response.Body is closed
    - noctx             # detect http request without context

issues:
  # Reasonable exclusions for this codebase
  exclude-rules:
    # Test files — allow more flexibility
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - gocritic

    # Generated files — don't lint
    - path: docs/
      linters:
        - all

    # Migration files — SQL, not Go
    - path: migrations/
      linters:
        - all

    # Allow G304 (file path from variable) in migration runner
    - path: internal/infrastructure/database/gorm\.go
      linters:
        - gosec
      text: "G304"

    # Allow unhandled errors on response writes (standard HTTP pattern)
    - path: internal/interfaces/http/
      linters:
        - errcheck
      text: "json.NewEncoder"

    # Allow shadowing of err in test helpers
    - path: _test\.go
      linters:
        - govet
      text: "shadow"

  # Maximum issues per linter (0 = unlimited)
  max-issues-per-linter: 50
  max-same-issues: 10

  # Raise issues from new code only (useful during migration)
  new: false
