        "leaders" sees all, "stewards" sees stewards+members, "members" sees members
        only.'
      parameters:
      - description: Search term in title or author
        in: query
        name: search
        type: string
      - description: Filter by series ID
        in: query
        name: series_id
        type: string
      - description: Filter by free status
        in: query
        name: is_free
        type: boolean
      - description: Viewer role for access control (leaders, stewards, members)
        in: query
        name: access
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
