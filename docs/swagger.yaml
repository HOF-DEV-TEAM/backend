      userName:
        type: string
    type: object
  bitbucket_org_hofng_hofApp_internal_domain_user.VerificationStatus:
    enum:
    - 0
    - 1
    - 2
    - 3
    format: int32
    type: integer
    x-enum-varnames:
    - Unverified
    - PhoneVerified
    - EmailVerified
    - EmailAndPhoneVerified
info:
  contact:
    email: dev@hofng.org
    name: HOF Dev Team
  description: Heritage of Faith Church — audio content and subscription platform.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://hofng.org/terms
  title: HOF Backend API
  version: "2.0"
paths:
  /admin/audio_message/:
    post:
      consumes:
      - application/json
      description: 'Create a new audio message with optional access control. Access
        levels: "leaders" (leaders only), "stewards" (stewards+leaders), "members"
        (all roles). Defaults to "members". URLs are trimmed and checked for uniqueness.'
      parameters:
      - description: Message payload with optional 'access' field
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/bitbucket_org_hofng_hofApp_internal_application_content.CreateMessageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/bitbucket_org_hofng_hofApp_internal_domain_content.AudioMessage'
        "400":
          description: Invalid access value or other validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Audio URL already exists
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new audio message
      tags:
      - content
  /admin/audio_message/delete/{message_id}:
    delete:
      parameters:
      - description: Message ID
        in: path
        name: message_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete an audio message
      tags:
      - content
  /admin/audio_message/meditation:
    post:
      consumes:
      - application/json
      parameters:
      - description: Meditation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/bitbucket_org_hofng_hofApp_internal_application_content.CreateMeditationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/bitbucket_org_hofng_hofApp_internal_domain_content.Meditation'
      security:
      - BearerAuth: []
      summary: Create a new meditation
      tags:
      - content
  /admin/audio_message/meditation/{meditation_id}:
    put:
      consumes:
      - application/json
      parameters:
      - description: Meditation ID
        in: path
        name: meditation_id
        required: true
        type: string
      - description: Updated meditation fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/bitbucket_org_hofng_hofApp_internal_application_content.UpdateMeditationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/bitbucket_org_hofng_hofApp_internal_domain_content.Meditation'
      security:
      - BearerAuth: []
      summary: Update an existing meditation
      tags:
      - content
  /admin/audio_message/meditation/delete/{meditation_id}:
    delete:
      parameters:
      - description: Meditation ID
        in: path
        name: meditation_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a meditation
      tags:
      - content
  /admin/audio_message/update/{message_id}:
    put:
      consumes:
      - application/json
      description: Update an audio message. Can change access level via 'access' field
        (leaders, stewards, members). URLs are trimmed and checked for uniqueness
        against other messages.
      parameters:
      - description: Message ID
        in: path
        name: message_id
        required: true
        type: string
      - description: Updated message fields (all optional)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/bitbucket_org_hofng_hofApp_internal_application_content.UpdateMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/bitbucket_org_hofng_hofApp_internal_domain_content.AudioMessage'
        "400":
          description: Invalid access value or other validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Audio URL already used by another message
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update an existing audio message
      tags:
      - content
  /admin/audio_series/:
    post:
      consumes:
      - application/json
      parameters:
      - description: Series payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/bitbucket_org_hofng_hofApp_internal_application_content.CreateSeriesRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/bitbucket_org_hofng_hofApp_internal_domain_content.AudioSeries'
      security:
      - BearerAuth: []
      summary: Create a new audio series
      tags:
      - content
  /admin/audio_series/delete/{series_id}:
    delete:
      parameters:
      - description: Series ID
        in: path
        name: series_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete an audio series
      tags:
      - content
  /admin/audio_series/update/{series_id}:
    put:
      consumes:
      - application/json
      parameters:
      - description: Series ID
        in: path
        name: series_id
        required: true
        type: string
      - description: Updated series fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/bitbucket_org_hofng_hofApp_internal_application_content.UpdateSeriesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/bitbucket_org_hofng_hofApp_internal_domain_content.AudioSeries'
      security:
      - BearerAuth: []
      summary: Update an existing audio series
      tags:
      - content
  /admin/global:
    get:
      produces:
      - application/json
      responses:
        "200":
