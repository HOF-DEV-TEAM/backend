name: CI

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master, develop]

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  # Raise this as the test suite grows: 2 → 30 → 50 → 70
  COVERAGE_THRESHOLD: 2

jobs:
  # ── Job 1: Build & Vet ──────────────────────────────────────────────────────
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build -v -o /dev/null ./cmd/main.go

      - name: Vet
        run: go vet ./...

  # ── Job 2: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        env:
          GOTOOLCHAIN: auto
        with:
          version: latest
          args: --timeout=5m

  # ── Job 3: Security ─────────────────────────────────────────────────────────
  security:
    name: Security (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ── Job 4: Unit Tests + Coverage ────────────────────────────────────────────
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: |
          go test \
            -race \
            -count=1 \
            -timeout=120s \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          echo "Threshold: ${{ env.COVERAGE_THRESHOLD }}%"
          if (( $(echo "$COVERAGE < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold ${{ env.COVERAGE_THRESHOLD }}%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets threshold ${{ env.COVERAGE_THRESHOLD }}%"
          fi

      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      - name: Coverage summary (PR annotation)
        if: github.event_name == 'pull_request'
        run: |
          go tool cover -func=coverage.out | tail -1

  # ── Job 5: Integration Tests ────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hofuser
          POSTGRES_PASSWORD: hofpassword
          POSTGRES_DB: hofdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://hofuser:hofpassword@localhost:5432/hofdb_test?sslmode=disable
      DATABASE_URL: postgres://hofuser:hofpassword@localhost:5432/hofdb_test?sslmode=disable
      JWT_SIGNING_KEY: ci-test-signing-key-change-in-production
      JWT_SECRET: ci-test-secret-change-in-production
      APP_ENV: test
      PORT: 8081
      SERVER_URL: http://localhost:8081

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U hofuser; do
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Run integration tests
        run: |
          go test \
            -v \
            -race \
            -count=1 \
            -timeout=180s \
            -tags integration \
            ./...

  # ── Job 6: Swagger Docs (push to master only) ───────────────────────────────
  docs:
    name: Update Swagger Docs
    runs-on: ubuntu-latest
    needs: [build, lint, security, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Regenerate docs
        run: swag init -g cmd/main.go -o docs --parseDependency

      - name: Copy to api-docs
        run: cp docs/swagger.json api-docs/swagger.json 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./api-docs

  # ── Job 7: Deploy to Heroku (push to master only) ───────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, lint, security, test, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Heroku Container Registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          echo "$HEROKU_API_KEY" | docker login --username=_ --password-stdin registry.heroku.com

      - name: Build Docker image
        run: |
          docker build \
            --tag registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/web \
            --file Dockerfile \
            .

      - name: Push to Heroku registry
        run: docker push registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/web

      - name: Release on Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:release web --app ${{ secrets.HEROKU_APP_NAME }}

      - name: Smoke test production
        env:
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          sleep 10  # allow dyno to restart
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ secrets.HEROKU_APP_NAME }}.herokuapp.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "✅ Production health check passed"
