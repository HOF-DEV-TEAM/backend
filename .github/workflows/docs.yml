name: Deploy API Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/swagger.json'
      - 'api-docs/**'
      - '.github/workflows/docs.yml'
      # Also trigger when annotations change so docs stay in sync
      - 'internal/**/*.go'
      - 'cmd/main.go'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Regenerate Swagger docs
        run: swag init -g cmd/main.go -o docs --parseDependency

      - name: Copy swagger.json to api-docs
        run: cp docs/swagger.json api-docs/swagger.json

      - name: Commit regenerated swagger.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/swagger.json api-docs/swagger.json
          git diff --staged --quiet || git commit -m "docs: regenerate swagger.json from ${{ github.sha }}" && git push

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./api-docs
          production-branch: master
          production-deploy: true
          deploy-message: "docs: auto-sync API reference from ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
