name: Deploy API Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/swagger.json'
      - 'api-docs/**'
      - '.github/workflows/docs.yml'
      # Also trigger when annotations change so docs stay in sync
      - 'internal/**/*.go'
      - 'cmd/main.go'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Regenerate Swagger docs
        run: swag init -g cmd/main.go -o docs --parseDependency

      - name: Copy swagger.json to api-docs
        run: cp docs/swagger.json api-docs/swagger.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./api-docs
          publish_branch: gh-pages
          commit_message: "docs: auto-sync API reference from ${{ github.sha }}"
